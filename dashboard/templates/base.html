<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}GDPR SAR Monitor{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .tag-chip {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      margin: 1px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .progress { height: 6px; }
    .status-badge { font-size: 0.75rem; letter-spacing: 0.05em; }
    .reply-row { border-left: 3px solid #dee2e6; margin-left: 0; padding-left: 12px; }
    .reply-row + .reply-row { margin-top: 1rem; }
    .snippet-text { font-size: 0.85rem; color: #6c757d; }
    .file-tree { font-size: 0.85rem; font-family: monospace; }
    .data-category-chip {
      background: #e8f4fd;
      color: #0d6efd;
      border-radius: 12px;
      padding: 3px 10px;
      font-size: 0.78rem;
      margin: 2px;
      display: inline-block;
    }
    .action-hint a.text-truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .action-hint {
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 6px;
      background: #fff3cd;
      color: #664d03;
      margin-top: 6px;
    }
    .navbar-brand { font-weight: 700; letter-spacing: -0.02em; }
  </style>
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom mb-4 px-4">
    <a class="navbar-brand" href="/">&#x1F512; GDPR SAR Monitor</a>
    <div class="d-flex gap-3 align-items-center">
      <a class="text-muted small text-decoration-none" href="/">Dashboard</a>
    </div>
    {% block nav_extra %}{% endblock %}
  </nav>
  <div class="container-xl">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
