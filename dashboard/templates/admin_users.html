{% extends "base.html" %}
{% block title %}Users — GDPR Agent{% endblock %}
{% block content %}
<div class="container mt-4">
  <h3>Registered Users</h3>
  <table class="table">
    <thead><tr><th>Email</th><th>Name</th><th>Role</th><th>Joined</th></tr></thead>
    <tbody>
    {% for email, u in users.items() %}
      <tr>
        <td>{{ email }}</td>
        <td>{{ u.name }}</td>
        <td>{{ u.role }}</td>
        <td>{{ u.created_at[:10] }}</td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
