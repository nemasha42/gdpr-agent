<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LLM Cost Calculator{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #f8f9fa; }
    .navbar-dark { background: #1a1a2e !important; }
    .stat-card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .stat-card .display-6 { font-size: 1.6rem; font-weight: 700; }
    .table th { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; color: #6c757d; }
    .found-yes { color: #198754; font-weight: 600; }
    .found-no  { color: #dc3545; }
    .total-row { font-weight: 700; background: #f1f3f5; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark px-4 py-2" style="background:#1a1a2e;">
    <a class="navbar-brand fw-bold" href="/">&#x1F4B8; LLM Cost Calculator</a>
    <div class="d-flex gap-3">
      <a class="text-white-50 small text-decoration-none" href="/">Overview</a>
      <a class="text-white-50 small text-decoration-none" href="/by-company">By Company</a>
      <a class="text-white-50 small text-decoration-none" href="/by-model">By Model</a>
    </div>
  </nav>
  <div class="container-xl py-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
