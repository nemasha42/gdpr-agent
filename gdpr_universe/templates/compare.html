{% extends "base.html" %}
{% block title %}Compare — GDPR Universe{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Company Benchmarking</h4>
    <form method="POST" action="/compare/refresh" class="d-inline">
        <button type="submit" class="btn btn-primary btn-sm">Refresh</button>
    </form>
</div>
{% if not has_data %}
<div class="alert alert-warning py-2">No comparison data cached yet. Click <strong>Refresh</strong> to compute.</div>
{% endif %}
{% endblock %}
